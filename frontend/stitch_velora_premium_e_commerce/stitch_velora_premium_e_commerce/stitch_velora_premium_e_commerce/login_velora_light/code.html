<!DOCTYPE html>

<html class="h-full bg-background" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Velora - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#e1e8fd",
                        "surface-container-highest": "#dce2f7",
                        "tertiary-fixed-dim": "#ffb783",
                        "primary-container": "#6063ee",
                        "on-background": "#141b2b",
                        "surface-container": "#e9edff",
                        "error": "#ba1a1a",
                        "surface-dim": "#d3daef",
                        "surface-bright": "#f9f9ff",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed-variant": "#3e4755",
                        "tertiary-fixed": "#ffdcc5",
                        "tertiary": "#904900",
                        "surface-variant": "#dce2f7",
                        "on-tertiary-fixed": "#301400",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "surface-container-low": "#f1f3ff",
                        "primary-fixed": "#e1e0ff",
                        "outline-variant": "#c7c4d7",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#b55d00",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#293040",
                        "inverse-on-surface": "#edf0ff",
                        "outline": "#767586",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "surface": "#f9f9ff",
                        "primary": "#4648d4",
                        "on-surface-variant": "#464554",
                        "on-primary-container": "#fffbff",
                        "secondary-fixed": "#d9e3f4",
                        "primary-fixed-dim": "#c0c1ff",
                        "surface-tint": "#494bd6",
                        "secondary": "#555f6d",
                        "secondary-fixed-dim": "#bdc7d8",
                        "on-tertiary-container": "#fffbff",
                        "on-surface": "#141b2b",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-container": "#596372",
                        "inverse-primary": "#c0c1ff",
                        "on-tertiary-fixed-variant": "#703700",
                        "on-secondary-fixed": "#121c28",
                        "background": "#f9f9ff",
                        "secondary-container": "#d6e0f1",
                        "on-primary-fixed": "#07006c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "md": "16px",
                        "xl": "32px",
                        "3xl": "64px",
                        "margin-desktop": "40px",
                        "margin-mobile": "16px",
                        "lg": "24px",
                        "base": "4px",
                        "2xl": "48px",
                        "gutter": "16px",
                        "sm": "12px",
                        "xs": "8px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "price-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "price-lg": ["20px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .shadow-subtle {
            box-shadow: 0px 10px 15px -3px rgba(0, 0, 0, 0.08);
        }
        .input-glow:focus {
            box-shadow: 0 0 0 2px rgba(70, 72, 212, 0.2);
        }
    </style>
</head>
<body class="h-full flex items-center justify-center bg-background p-margin-mobile md:p-margin-desktop font-body-md text-on-surface">
<main class="w-full max-w-md">
<!-- Logo -->
<div class="text-center mb-xl">
<h1 class="text-display-lg font-display-lg text-primary">Velora</h1>
<p class="text-body-md font-body-md text-on-surface-variant mt-sm">Welcome back. Please enter your details.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-subtle p-xl border border-outline-variant/30">
<form action="#" class="space-y-lg" method="POST">
<!-- Email Field -->
<div>
<label class="block text-body-sm font-label-md font-bold text-on-surface mb-xs" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg text-body-md font-body-md text-on-surface bg-surface-container-lowest focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary input-glow transition-all duration-200" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block text-body-sm font-label-md font-bold text-on-surface mb-xs" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg text-body-md font-body-md text-on-surface bg-surface-container-lowest focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary input-glow transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Options -->
<div class="flex items-center justify-between mt-sm">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded bg-surface-container-lowest cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-body-sm font-body-sm text-on-surface-variant cursor-pointer" for="remember-me">
                            Remember me
                        </label>
</div>
<div class="text-body-sm font-body-sm">
<a class="font-label-md text-primary hover:text-primary-fixed-dim transition-colors duration-200" href="#">Forgot password?</a>
</div>
</div>
<!-- Submit Button -->
<div class="pt-sm">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-label-md font-label-md text-on-primary bg-primary hover:bg-surface-tint focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200" type="submit">
                        Sign in
                    </button>
</div>
<!-- Social Login Divider -->
<div class="relative mt-lg mb-md">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-body-sm font-body-sm">
<span class="px-2 bg-surface-container-lowest text-on-surface-variant">Or continue with</span>
</div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-sm">
<button class="w-full inline-flex justify-center py-2 px-4 border border-outline-variant rounded-lg shadow-sm bg-surface-container-lowest text-label-md font-label-md text-on-surface hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200" type="button">
<svg class="w-5 h-5 mr-2" fill="currentColor" viewbox="0 0 24 24">
<path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"></path>
</svg>
                        Google
                    </button>
<button class="w-full inline-flex justify-center py-2 px-4 border border-outline-variant rounded-lg shadow-sm bg-surface-container-lowest text-label-md font-label-md text-on-surface hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200" type="button">
<svg class="w-5 h-5 mr-2" fill="currentColor" viewbox="0 0 24 24">
<path d="M22,12c0-5.52-4.48-10-10-10S2,6.48,2,12c0,4.84,3.44,8.87,8,9.8V15H8v-3h2V9.5C10,7.57,11.57,6,13.5,6H16v3h-2c-0.55,0-1,0.45-1,1v2h3v3h-3v6.95C18.05,21.45,22,17.19,22,12z"></path>
</svg>
                        Facebook
                    </button>
</div>
</form>
</div>
<!-- Sign Up Link -->
<p class="mt-lg text-center text-body-sm font-body-sm text-on-surface-variant">
            Don't have an account? 
            <a class="font-label-md text-primary hover:text-primary-fixed-dim transition-colors duration-200" href="#">Sign up</a>
</p>
</main>
</body></html>
